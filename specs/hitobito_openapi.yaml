  schemas:
    types:
      type: string
      enum:
      - additional_addresses
      - additional_emails
      - courses
      - dates
      - event_kind_categories
      - event_kinds
      - event_levels
      - tours
      - events
      - external_invoices
      - groups
      - invoice_items
      - invoices
      - mailing_lists
      - person-name
      - people
      - phone_numbers
      - roles
      - self_registrations
      - social_accounts
    additional_addresses:
      type: object
      description: Additional address attributes
      properties:
        label:
          type: string
        public:
          type: boolean
        contactable_id:
          type: integer
        contactable_type:
          type: string
        address_care_of:
          type: string
        street:
          type: string
        housenumber:
          type: string
        postbox:
          type: string
        zip_code:
          type: string
        town:
          type: string
        country:
          type: string
      additionalProperties: false
    additional_addresses_relationships:
      "$ref": "#/components/schemas/jsonapi_relationships"
    additional_addresses_resource:
      type: object
      properties:
        id:
          type: string
          example: '9'
        type:
          type: string
          enum:
          - additional_addresses
        attributes:
          "$ref": "#/components/schemas/additional_addresses"
        relationships:
          "$ref": "#/components/schemas/additional_addresses_relationships"
        links:
          "$ref": "#/components/schemas/jsonapi_links"
      additionalProperties: false
    additional_addresses_single:
      type: object
      properties:
        data:
          "$ref": "#/components/schemas/additional_addresses_resource"
        included:
          description: To reduce the number of HTTP requests, servers **MAY** allow
            responses that include related resources along with the requested primary
            resources. Such responses are called "compound documents".
          type: array
          items:
            "$ref": "#/components/schemas/jsonapi_resource"
          uniqueItems: true
        meta:
          "$ref": "#/components/schemas/jsonapi_meta"
        links:
          description: Link members related to the primary data.
          allOf:
          - "$ref": "#/components/schemas/jsonapi_links"
